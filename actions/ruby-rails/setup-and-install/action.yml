name: Setup and Install (Ruby on Rails)
description: Set up Ruby and Node.js environments and install dependencies for a Rails application.
inputs:
  install_ruby:
    description: Set to false to skip Ruby setup and installation steps.
    required: false
    default: "true"
  install_node:
    description: Set to false to skip Nodejs setup and installation steps.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    # ---- GitHub-hosted path ----
    - name: Install packages (GitHub-hosted)
      if: ${{ runner.environment != 'self-hosted' }}
      shell: bash
      run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable curl libjemalloc2 libvips postgresql-client libpq-dev

    - name: Set up Ruby (GitHub-hosted)
      uses: ruby/setup-ruby@v1
      if: ${{ runner.environment != 'self-hosted' && inputs.install_ruby == 'true' }}
      with:
        ruby-version: mise.toml
        bundler-cache: true

    - name: Install pnpm (GitHub-hosted)
      uses: pnpm/action-setup@v4
      if: ${{ runner.environment != 'self-hosted' && inputs.install_node == 'true' }}

    - uses: actions/setup-node@v6
      if: ${{ runner.environment != 'self-hosted' && inputs.install_node == 'true' }}
      with:
        node-version: "24"
        cache: pnpm

    - name: Install modules (GitHub-hosted)
      if: ${{ runner.environment != 'self-hosted' && inputs.install_node == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile

    # ---- Self-hosted path ----
    # On Hetzner self-hosted: image bakes ruby, node, pnpm, system deps.
    # ruby/setup-ruby refuses non-GitHub-hosted base images. Use baked
    # toolchain + bundle install directly. pnpm install runs the same.
    - name: Bundle install (self-hosted)
      if: ${{ runner.environment == 'self-hosted' && inputs.install_ruby == 'true' }}
      shell: bash
      run: |
        ruby --version
        gem install --no-document bundler --conservative
        bundle config set --local path "vendor/bundle"
        bundle install --jobs 4 --retry 3

    - name: pnpm install (self-hosted)
      if: ${{ runner.environment == 'self-hosted' && inputs.install_node == 'true' }}
      shell: bash
      run: |
        node --version
        pnpm --version
        pnpm install --frozen-lockfile
