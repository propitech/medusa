name: Setup and Install (Ruby on Rails)
description: Install Ruby gems and Node modules. Assumes a propitech runner-rails container image with Ruby, Node, pnpm, and system deps already baked.
inputs:
  install_ruby:
    description: Set to false to skip bundle install.
    required: false
    default: "true"
  install_node:
    description: Set to false to skip pnpm install.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Bundle install
      if: ${{ inputs.install_ruby == 'true' }}
      shell: bash
      run: |
        ruby --version
        gem install --no-document bundler --conservative
        bundle config set --local path "vendor/bundle"
        bundle install --jobs 4 --retry 3

    - name: pnpm install
      if: ${{ inputs.install_node == 'true' }}
      shell: bash
      run: |
        node --version
        pnpm --version
        pnpm install --frozen-lockfile
