name: medusa CI

# Quality gate for the medusa repo itself so reusable-workflow drift
# gets caught before consumers bump `@vN`:
#   actionlint  — GHA workflow + composite action syntax
#   zizmor      — security smells (unpinned refs, broad perms, etc)
#   shellcheck  — bootstrap script
#
# Each job always starts (so the required status check reports back),
# but the heavy lint step is skipped when only docs / markdown changed.
# Achieved with `dorny/paths-filter` deriving an output that gates the
# subsequent step.

"on":
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: changed
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            ci:
              - '.github/workflows/**'
              - 'actions/**'
              - '.github/zizmor.yml'
      - if: steps.changed.outputs.ci == 'true'
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          fail-on-error: true
      - if: steps.changed.outputs.ci != 'true'
        run: echo "No CI-relevant paths changed; actionlint skipped."

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: changed
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            ci:
              - '.github/workflows/**'
              - 'actions/**'
              - '.github/zizmor.yml'
      - if: steps.changed.outputs.ci == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - if: steps.changed.outputs.ci == 'true'
        run: uvx zizmor --persona=regular --format=plain .github/workflows actions
      - if: steps.changed.outputs.ci != 'true'
        run: echo "No CI-relevant paths changed; zizmor skipped."

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: changed
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            scripts:
              - 'scripts/**'
      - if: steps.changed.outputs.scripts == 'true'
        run: shellcheck scripts/*.sh
      - if: steps.changed.outputs.scripts != 'true'
        run: echo "No scripts changed; shellcheck skipped."
