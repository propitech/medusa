name: Ruby on Rails CI (reusable)

on:
  workflow_call:
    inputs:
      codecov-slug:
        description: "org/repo slug for codecov-action. Defaults to the calling repo's github.repository (e.g. propitech/dance_school). Override only for forks reporting under an upstream slug."
        type: string
        required: false
        default: ${{ github.repository }}
      enable-frontend:
        description: "Toggle pnpm setup, frontend lint, and Node-related steps."
        type: boolean
        default: true
      test-command:
        description: "Command to run the test suite."
        type: string
        default: "bin/rails db:test:prepare spec"
      security-scan-command:
        description: "Command to run the dependency security scan."
        type: string
        default: "bin/rails bundle:audit:update && bin/rails bundle:audit"
      runs_on:
        description: "JSON-encoded runs-on value. Pass a quoted string for a single label (e.g. '\"ubuntu-latest\"') or a JSON array for label sets (e.g. '[\"self-hosted\",\"hetzner\",\"rails-8.1\"]'). Empty default falls back to ubuntu-latest. Typical use: set repo Actions variable RUNNER_LABELS to the JSON array and pass the variable into this input via a workflow expression."
        type: string
        required: false
        default: ''
      container-image:
        description: "Container image used for every job (Ruby + Node + pnpm + system deps baked). Drives both GitHub-hosted and self-hosted runs through the same toolchain. Pinned by digest for reproducibility; bump in lockstep with the runner-image rebuild."
        type: string
        required: false
        default: 'ghcr.io/propitech/runner-rails-8.1@sha256:b0e99b401c057b072268be176dac28a8c46d78dc0099a7b3efbeb32324bf6f80'
      timeout-minutes:
        description: "Per-job wall-clock cap, applied uniformly to scan_ruby, lint, and test. Default 30 leaves room for a slow Selenium suite; bump for repos with long test runs."
        type: number
        required: false
        default: 30
    secrets:
      CODECOV_TOKEN:
        description: "Codecov upload token. When unset, the upload step is skipped."
        required: false
      QLTY_COVERAGE_TOKEN:
        description: "Quality.sh coverage upload token. When unset, the upload step is skipped."
        required: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only cancel superseded runs on PRs; pushes to default branch may drive
  # deploys downstream and should not be auto-cancelled by rebases.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan_ruby:
    # Dependabot PRs only get forced onto GitHub-hosted runners for
    # PUBLIC repos — there a fork or hijacked dep could exfiltrate
    # via the shared self-hosted VM. On private repos the threat
    # surface is contained to org-write contributors, so dependabot
    # runs on the same self-hosted route as humans. The container
    # image is the same either way.
    runs-on: ${{ (github.actor == 'dependabot[bot]' && github.event.repository.private != true) && 'ubuntu-latest' || (inputs.runs_on != '' && fromJSON(inputs.runs_on) || 'ubuntu-latest') }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    container:
      image: ${{ inputs.container-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: propitech/medusa/actions/ruby-rails/setup-and-install@v4
        with:
          install_node: "false"

      - name: Scan Ruby dependencies for vulnerabilities
        env:
          # Indirect through env so zizmor's template-injection check
          # sees a shell-level expansion (safer than a GHA-level
          # template that would parse before the shell runs).
          SECURITY_SCAN_COMMAND: ${{ inputs.security-scan-command }}
        run: bash -c "$SECURITY_SCAN_COMMAND"

  lint:
    runs-on: ${{ (github.actor == 'dependabot[bot]' && github.event.repository.private != true) && 'ubuntu-latest' || (inputs.runs_on != '' && fromJSON(inputs.runs_on) || 'ubuntu-latest') }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    container:
      image: ${{ inputs.container-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: propitech/medusa/actions/ruby-rails/setup-and-install@v4
        with:
          install_node: ${{ inputs.enable-frontend && 'true' || 'false' }}

      - name: Lint Ruby code for consistent style
        run: bundle exec rubocop

      - name: Lint front-end code for consistent style
        if: ${{ inputs.enable-frontend }}
        run: pnpm lint

  test:
    runs-on: ${{ (github.actor == 'dependabot[bot]' && github.event.repository.private != true) && 'ubuntu-latest' || (inputs.runs_on != '' && fromJSON(inputs.runs_on) || 'ubuntu-latest') }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    # All jobs run inside the propitech runner image. GHA creates a per-job
    # bridge network; services are reachable via their service name (here:
    # `postgres`), not localhost. No host port is published, so multiple
    # concurrent jobs on one self-hosted VM no longer collide on 5432.
    #
    # `--shm-size=2g`: default 64M /dev/shm crashes headless Chromium under
    # Selenium system tests with "DevToolsActivePort file doesn't exist".
    # The previous supervisor wrapper set this on the runner agent container;
    # under Path Y the job container needs it directly.
    container:
      image: ${{ inputs.container-image }}
      options: --shm-size=2g

    services:
      postgres:
        # postgres:17-alpine pinned by digest. Bump alongside the
        # postgres-client major shipped in the runner image. Renovate /
        # dependabot can be wired to track docker tags later.
        image: postgres@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: propitech/medusa/actions/ruby-rails/setup-and-install@v4
        with:
          install_node: ${{ inputs.enable-frontend && 'true' || 'false' }}

      - name: Run tests
        env:
          CI: true
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@postgres:5432
          TEST_COMMAND: ${{ inputs.test-command }}
        run: bash -c "$TEST_COMMAND"

      - name: Keep screenshots and logs from failed system tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: screenshots-and-logs
          path: |
            ${{ github.workspace }}/tmp/capybara
            ${{ github.workspace }}/log
          if-no-files-found: ignore

      # `secrets` context is not allowed in step-level `if:` for a
      # workflow_call, so map the secret to env first and gate on env.
      - name: Upload coverage reports to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          slug: ${{ inputs.codecov-slug }}
          verbose: true
          fail_ci_if_error: true
          files: ./coverage/coverage.xml,./coverage/coverage.json,./junit.xml

      - name: Upload result to Quality.sh
        env:
          QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
        if: ${{ env.QLTY_COVERAGE_TOKEN != '' }}
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2
        with:
          token: ${{ env.QLTY_COVERAGE_TOKEN }}
          files: coverage/.resultset.json
