name: Ruby on Rails CI (reusable)

on:
  workflow_call:
    inputs:
      codecov-slug:
        description: "org/repo slug for codecov-action. Defaults to the calling repo's github.repository (e.g. propitech/dance_school). Override only for forks reporting under an upstream slug."
        type: string
        required: false
        default: ${{ github.repository }}
      enable-frontend:
        description: "Toggle pnpm setup, frontend lint, and Node-related steps."
        type: boolean
        default: true
      test-command:
        description: "Command to run the test suite."
        type: string
        default: "bin/rails db:test:prepare spec"
      security-scan-command:
        description: "Command to run the dependency security scan."
        type: string
        default: "bin/rails bundle:audit:update && bin/rails bundle:audit"
      runs_on:
        description: "JSON-encoded runs-on value. Pass a quoted string for a single label (e.g. '\"ubuntu-latest\"') or a JSON array for label sets (e.g. '[\"self-hosted\",\"hetzner\",\"rails-8.1\"]'). Empty default falls back to ubuntu-latest. Typical use: set repo Actions variable RUNNER_LABELS to the JSON array and pass the variable into this input via a workflow expression."
        type: string
        required: false
        default: ''
      container-image:
        description: "Container image used for every job (Ruby + Node + pnpm + system deps baked). Drives both GitHub-hosted and self-hosted runs through the same toolchain."
        type: string
        required: false
        default: 'ghcr.io/propitech/runner-rails-8.1:latest'
    secrets:
      CODECOV_TOKEN:
        description: "Codecov upload token. When unset, the upload step is skipped."
        required: false
      QLTY_COVERAGE_TOKEN:
        description: "Quality.sh coverage upload token. When unset, the upload step is skipped."
        required: false

# `packages: read` lets the workflow `GITHUB_TOKEN` pull the container image
# from GHCR when the package is org-private. Harmless when the package is
# public.
permissions:
  contents: read
  pull-requests: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only cancel superseded runs on PRs; pushes to default branch may drive
  # deploys downstream and should not be auto-cancelled by rebases.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan_ruby:
    # Dependabot PRs forced to GitHub-hosted: avoid running unaudited
    # transitive dependency code on the shared self-hosted VM. The
    # container image is the same either way.
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || (inputs.runs_on != '' && fromJSON(inputs.runs_on) || 'ubuntu-latest') }}
    container:
      image: ${{ inputs.container-image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: propitech/medusa/actions/ruby-rails/setup-and-install@v4
        with:
          install_node: "false"

      - name: Scan Ruby dependencies for vulnerabilities
        run: ${{ inputs.security-scan-command }}

  lint:
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || (inputs.runs_on != '' && fromJSON(inputs.runs_on) || 'ubuntu-latest') }}
    container:
      image: ${{ inputs.container-image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: propitech/medusa/actions/ruby-rails/setup-and-install@v4
        with:
          install_node: ${{ inputs.enable-frontend && 'true' || 'false' }}

      - name: Lint Ruby code for consistent style
        run: bundle exec rubocop

      - name: Lint front-end code for consistent style
        if: ${{ inputs.enable-frontend }}
        run: pnpm lint

  test:
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || (inputs.runs_on != '' && fromJSON(inputs.runs_on) || 'ubuntu-latest') }}
    # All jobs run inside the propitech runner image. GHA creates a per-job
    # bridge network; services are reachable via their service name (here:
    # `postgres`), not localhost. No host port is published, so multiple
    # concurrent jobs on one self-hosted VM no longer collide on 5432.
    #
    # `--shm-size=2g`: default 64M /dev/shm crashes headless Chromium under
    # Selenium system tests with "DevToolsActivePort file doesn't exist".
    # The previous supervisor wrapper set this on the runner agent container;
    # under Path Y the job container needs it directly.
    container:
      image: ${{ inputs.container-image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --shm-size=2g

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: propitech/medusa/actions/ruby-rails/setup-and-install@v4
        with:
          install_node: ${{ inputs.enable-frontend && 'true' || 'false' }}

      - name: Run tests
        env:
          CI: true
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@postgres:5432
        run: ${{ inputs.test-command }}

      - name: Keep screenshots and logs from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots-and-logs
          path: |
            ${{ github.workspace }}/tmp/capybara
            ${{ github.workspace }}/log
          if-no-files-found: ignore

      - name: Upload coverage reports to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ inputs.codecov-slug }}
          verbose: true
          fail_ci_if_error: true
          files: ./coverage/coverage.xml,./coverage/coverage.json,./junit.xml

      - name: Upload result to Quality.sh
        if: ${{ secrets.QLTY_COVERAGE_TOKEN != '' }}
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/.resultset.json
